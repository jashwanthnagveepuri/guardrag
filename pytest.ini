[pytest]
# =============================================================================
# GuardRAG — Pytest Configuration
# =============================================================================

# Test discovery
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Display
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests requiring external services
    unit: marks tests as unit tests (no external dependencies)
    guardrail: marks guardrail-specific tests
    api: marks API route tests
    services: marks service unit tests

# Coverage
[coverage:run]
source = guardrag
omit =
    guardrag/__main__.py
    */__init__.py

[coverage:report]
precision = 2
skip_covered = false
show_missing = true
fail_under = 80

[coverage:html]
directory = htmlcov
